name: Daily data pipeline

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC every day
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the updated JSON files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pipeline
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: python pipeline/run.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/spot_quantiles.json data/capture_prices.json data/yoy_overlay.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"

      - name: Push
        run: git push
